<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Lions Alliance</title>
  <meta name="description" content="The Lions Alliance — coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens (light theme from resume) ── */
    :root {
      --bg:      #f7f9fc;
      --panel:   #ffffff;
      --muted:   #53627a;
      --text:    #10131a;
      --brand:   #2563eb;
      --brand-2: #059669;
      --border:  #e6ecf5;
      --shadow:  0 10px 30px rgba(18,33,61,.08);
      --radius:  18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 500px at 80% -10%, rgba(37,99,235,.10), transparent 65%),
        radial-gradient(800px 400px at -5% 15%, rgba(5,150,105,.07), transparent 65%),
        var(--bg);
      background-attachment: fixed;
    }

    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 18px 32px;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .2px;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--brand); }

    /* ── Main ── */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
      gap: 0;
    }

    /* Badge */
    .badge {
      display: inline-block;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--brand) 8%, var(--panel));
      color: var(--brand);
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 28px;
    }

    /* Heading */
    h1 {
      font-size: clamp(36px, 6vw, 68px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -.5px;
      margin-bottom: 20px;
      color: var(--text);
    }
    h1 .accent { color: var(--brand); }

    /* Subtitle */
    .subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 52px;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      border-radius: 999px;
      margin: 0 auto 52px;
    }

    /* Nav cards */
    .nav-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 720px;
    }

    .nav-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      padding: 22px 28px;
      min-width: 190px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      transition: transform .14s ease, box-shadow .14s ease;
    }
    .nav-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(18,33,61,.13);
      text-decoration: none;
    }

    .nav-card .icon {
      font-size: 1.6rem;
      line-height: 1;
      margin-bottom: 4px;
    }
    .nav-card .label {
      font-size: 1rem;
      font-weight: 700;
    }
    .nav-card .desc {
      font-size: .85rem;
      color: var(--muted);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 32px;
      color: var(--muted);
      font-size: .9rem;
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .nav-card { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a class="logo" href="/"><span>The Lions</span> Alliance</a>
    </header>

    <main>
      <span class="badge">Launching Soon</span>
      <h1>Something is<br><span class="accent">on its way.</span></h1>
      <p class="subtitle">
        The Lions Alliance is being built. In the meantime, explore the pages below.
      </p>
      <div class="divider"></div>

      <nav class="nav-cards" aria-label="Available pages">
        <a class="nav-card" href="/weddingcambox">
          <div class="icon">📷</div>
          <div class="label">WeddingCamBox</div>
          <div class="desc">Camera rental for your big day</div>
        </a>
        <a class="nav-card" href="/resume">
          <div class="icon">📄</div>
          <div class="label">Resume</div>
          <div class="desc">Portfolio &amp; CV</div>
        </a>
        <a class="nav-card" href="/games">
          <div class="icon">🎮</div>
          <div class="label">Games</div>
          <div class="desc">Projects &amp; experiments</div>
        </a>
      </nav>
    </main>

    <footer>
      &copy; <span id="yr"></span> The Lions Alliance
    </footer>
  </div>

  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
